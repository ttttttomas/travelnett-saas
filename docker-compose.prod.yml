services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8012:8000"
    env_file:
      - ./backend/.env
    environment:
      - ENV=production
      - APP_ENV=production
      - PUBLIC_DATA_URL=https://api-tranett.iwebtecnology.com/MdpuF8KsXiRArNIHtI6pXO2XyLSJMTQ8_Tranett/data
    volumes:
      # Datos persistentes del SaaS (logos, imágenes de períodos, documentos)
      # El host tiene la carpeta real; el contenedor la ve en /home/iweb/data/travelnett
      - /home/iweb/saas/data/travelnett:/home/iweb/saas/data/travelnett
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api-tranett.iwebtecnology.com/MdpuF8KsXiRArNIHtI6pXO2XyLSJMTQ8_Tranett/api
        - NEXT_PUBLIC_DATA_URL=https://api-tranett.iwebtecnology.com/MdpuF8KsXiRArNIHtI6pXO2XyLSJMTQ8_Tranett/data
    ports:
      - "3012:3000"
    restart: unless-stopped

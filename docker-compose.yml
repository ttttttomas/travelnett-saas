services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8012:8000"
    env_file:
      # En el servidor: crear este archivo a partir de backend/.env.example
      - ./backend/.env
    environment:
      - ENV=production
      - APP_ENV=production
    volumes:
      # Datos persistentes del SaaS (logos, imágenes de períodos, documentos)
      # El host tiene la carpeta real; el contenedor la ve en /home/iweb/data/travelnett
      - /home/iweb/data/travelnett:/home/iweb/data/travelnett
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5

